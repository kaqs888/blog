<style>
/* === Brooks Trilogy single-post layout (cream, single-column) === */
body.is-single-post {
  --pa-bg: #f5f1e8;
  --pa-bg-elev: #ebe5d6;
  --pa-bg-card: #fbf8f0;
  --pa-bg-card-hi: #f3eedf;
  --pa-bg-tn: #f3ede0;
  --pa-border: #d9d0bb;
  --pa-border-hi: #b8ad94;
  --pa-text: #2a2723;
  --pa-text-dim: #5a5750;
  --pa-text-faint: #8a857a;
  --pa-accent: #b8860b;
  --pa-accent-violet: #6b4fa3;
  --pa-en-color: #5a6b85;
  --pa-tn-color: #8b6f3f;

  margin: 0;
  background: var(--pa-bg);
  color: var(--pa-text-dim);
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 16px;
  line-height: 1.75;
}

/* Brand bar */
body.is-single-post .pa-brand-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 40px;
  border-bottom: 1px solid var(--pa-border);
  background: var(--pa-bg);
}
body.is-single-post .pa-brand {
  font-size: 15px;
  font-weight: 700;
  color: var(--pa-text);
  text-decoration: none;
  letter-spacing: 0.03em;
  transition: color 0.15s;
}
body.is-single-post .pa-brand:hover { color: var(--pa-accent); }
body.is-single-post .pa-nav {
  display: flex;
  gap: 18px;
}
body.is-single-post .pa-nav a {
  font-size: 13px;
  color: var(--pa-text-faint);
  text-decoration: none;
  transition: color 0.15s;
}
body.is-single-post .pa-nav a:hover { color: var(--pa-accent); }

/* Main column */
body.is-single-post .pa-main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 36px 40px 80px;
}

/* Two-column layout: article + sticky TOC */
body.is-single-post .pa-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 240px;
  gap: 56px;
  margin-top: 8px;
}
body.is-single-post .pa-article { min-width: 0; max-width: 800px; }

/* Right-side sticky TOC */
body.is-single-post .pa-toc {
  position: sticky;
  top: 32px;
  align-self: start;
  font-size: 13px;
  line-height: 1.65;
  max-height: calc(100vh - 64px);
  overflow-y: auto;
  padding-left: 16px;
  border-left: 1px solid var(--pa-border);
}
body.is-single-post .pa-toc-title {
  font-family: Menlo, monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--pa-text-faint);
  margin-bottom: 12px;
}
body.is-single-post .pa-toc-body ul,
body.is-single-post .pa-toc-body ol {
  list-style: none;
  margin: 0;
  padding: 0;
}
body.is-single-post .pa-toc-body li { margin: 4px 0; }
body.is-single-post .pa-toc-body a {
  color: var(--pa-text-dim);
  text-decoration: none;
  transition: color 0.15s;
  display: block;
  padding: 2px 0;
}
body.is-single-post .pa-toc-body a:hover { color: var(--pa-accent); }
body.is-single-post .pa-toc-body ul ul {
  padding-left: 14px;
  margin-top: 2px;
}
body.is-single-post .pa-toc-body ul ul a {
  font-size: 12.5px;
  color: var(--pa-text-faint);
}

/* Breadcrumb */
body.is-single-post .pa-breadcrumb {
  color: var(--pa-text-faint);
  font-family: Menlo, monospace;
  font-size: 12px;
  letter-spacing: 0.05em;
  margin-bottom: 20px;
}
body.is-single-post .pa-breadcrumb a {
  color: var(--pa-text-faint);
  text-decoration: none;
  transition: color 0.15s;
}
body.is-single-post .pa-breadcrumb a:hover { color: var(--pa-accent); }
body.is-single-post .pa-breadcrumb .sep { margin: 0 8px; color: var(--pa-border-hi); }
body.is-single-post .pa-breadcrumb .cur { color: var(--pa-text-dim); }

/* Chapter meta */
body.is-single-post .pa-chapter-meta {
  color: var(--pa-text-faint);
  font-family: Menlo, monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  text-transform: uppercase;
}

/* Title */
body.is-single-post .pa-title {
  font-size: 32px;
  font-weight: 600;
  color: var(--pa-text);
  letter-spacing: -0.01em;
  margin: 0 0 32px;
}

/* Post content typography */
body.is-single-post .post-content {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 16px;
  line-height: 1.75;
  color: var(--pa-text-dim);
}
body.is-single-post .post-content h1 {
  font-size: 28px; font-weight: 600; color: var(--pa-text);
  margin: 32px 0 8px; letter-spacing: -0.01em;
}
body.is-single-post .post-content h2 {
  font-size: 22px; font-weight: 600; color: var(--pa-text);
  margin: 48px 0 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--pa-border);
}
body.is-single-post .post-content h3 {
  font-size: 17px; font-weight: 600; color: var(--pa-text);
  margin: 28px 0 10px;
}
body.is-single-post .post-content h4 {
  font-size: 15px; font-weight: 600; color: var(--pa-text);
  margin: 20px 0 8px;
}
body.is-single-post .post-content p {
  margin: 16px 0; color: var(--pa-text-dim); font-size: 15.5px;
}
body.is-single-post .post-content p strong,
body.is-single-post .post-content li strong {
  color: var(--pa-text); font-weight: 600;
}
body.is-single-post .post-content em {
  color: var(--pa-text);
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic;
}
body.is-single-post .post-content a {
  color: var(--pa-accent);
  text-decoration: none;
  border-bottom: 1px solid rgba(184, 134, 11, 0.3);
  transition: border-color 0.15s;
}
body.is-single-post .post-content a:hover { border-bottom-color: var(--pa-accent); }
body.is-single-post .post-content blockquote {
  background: var(--pa-bg-card);
  border-left: 3px solid var(--pa-accent-violet);
  padding: 14px 20px;
  margin: 20px 0;
  border-radius: 0 4px 4px 0;
  color: var(--pa-text-dim);
}
body.is-single-post .post-content blockquote p { margin: 6px 0; }
body.is-single-post .post-content ul,
body.is-single-post .post-content ol {
  margin: 14px 0 14px 24px; color: var(--pa-text-dim);
}
body.is-single-post .post-content li {
  margin: 6px 0; font-size: 15px; line-height: 1.7;
}
body.is-single-post .post-content hr {
  border: none;
  border-top: 1px solid var(--pa-border);
  margin: 32px 0;
}
body.is-single-post .post-content code {
  font-family: Menlo, monospace;
  font-size: 13.5px;
  background: var(--pa-bg-card-hi);
  color: var(--pa-text);
  padding: 1px 6px;
  border-radius: 3px;
}
/* Code blocks as shadowed cream cards */
body.is-single-post .post-content pre,
body.is-single-post .post-content .highlight pre {
  background: var(--pa-bg-card) !important;
  color: var(--pa-text) !important;
  border: 1px solid var(--pa-border);
  border-radius: 6px;
  padding: 16px 20px;
  margin: 20px 0;
  overflow-x: auto;
  font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13.5px;
  line-height: 1.7;
  box-shadow: 0 1px 3px rgba(58, 50, 30, 0.06), 0 4px 12px rgba(58, 50, 30, 0.05);
}
body.is-single-post .post-content .highlight {
  background: transparent !important;
  margin: 0;
  border-radius: 0;
}
body.is-single-post .post-content pre code,
body.is-single-post .post-content .highlight pre code {
  background: transparent;
  padding: 0;
  color: var(--pa-text);
  font-size: inherit;
  font-family: inherit;
}
/* Drop dracula colors so cream theme stays readable */
body.is-single-post .post-content .chroma * {
  color: var(--pa-text) !important;
  background: transparent !important;
}
/* Safety: kill any leftover line-number table styling */
body.is-single-post .post-content .highlight table {
  width: 100%;
  border-collapse: collapse;
}
body.is-single-post .post-content .highlight table td {
  border: none !important;
  padding: 0;
}
body.is-single-post .post-content .highlight table .lntable { border: none; }
body.is-single-post .post-content .highlight .ln,
body.is-single-post .post-content .highlight .lnt { display: none !important; }

/* Shortcodes: translator-note */
body.is-single-post .post-content .translator-note {
  background: var(--pa-bg-tn);
  border: 1px dashed var(--pa-border-hi);
  border-left: 3px solid var(--pa-tn-color);
  padding: 16px 20px;
  margin: 20px 0;
  border-radius: 4px;
  position: relative;
}
body.is-single-post .post-content .translator-note::before {
  content: '译者注 · TRANSLATOR NOTE';
  position: absolute; top: -10px; left: 16px;
  background: var(--pa-bg);
  color: var(--pa-tn-color);
  font-family: Menlo, monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  padding: 2px 8px;
}

/* Shortcodes: quote-bi */
body.is-single-post .post-content .quote-bi {
  background: var(--pa-bg-card);
  border-left: 3px solid var(--pa-accent-violet);
  padding: 18px 22px;
  margin: 24px 0;
  border-radius: 0 4px 4px 0;
}
body.is-single-post .post-content .quote-bi .en {
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic; font-size: 14.5px;
  color: var(--pa-text); line-height: 1.7;
  margin-bottom: 8px;
}
body.is-single-post .post-content .quote-bi .cn {
  font-size: 14.5px; color: var(--pa-text-dim);
  line-height: 1.8; margin-bottom: 8px;
}
body.is-single-post .post-content .quote-bi .src {
  font-family: Menlo, monospace; font-size: 11px;
  color: var(--pa-text-faint);
  text-transform: uppercase; letter-spacing: 0.05em;
}

/* Shortcodes: fig-card */
body.is-single-post .post-content .fig-card {
  margin: 32px 0;
  background: var(--pa-bg-card);
  border: 1px solid var(--pa-border);
  border-radius: 4px;
  overflow: hidden;
}
body.is-single-post .post-content .fig-card img {
  width: 100%; height: auto; display: block; background: white;
}
body.is-single-post .post-content .fig-card figcaption {
  padding: 14px 20px;
  font-size: 13.5px; color: var(--pa-text-dim);
  background: var(--pa-bg-card-hi);
  border-top: 1px solid var(--pa-border);
  line-height: 1.7;
}
body.is-single-post .post-content .fig-card figcaption .fig-num {
  color: var(--pa-accent); font-family: Menlo, monospace;
  font-size: 11.5px; font-weight: 700;
  letter-spacing: 0.1em; margin-right: 8px;
}
body.is-single-post .post-content .fig-card figcaption .fig-en {
  color: var(--pa-en-color); font-family: Georgia, serif;
  font-style: italic; font-size: 12px;
  display: block; margin-top: 6px;
}

/* Chapter nav */
body.is-single-post .pa-chapter-nav {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 56px;
  padding-top: 24px;
  border-top: 1px solid var(--pa-border);
}
body.is-single-post .pa-chapter-nav .next { text-align: right; }
body.is-single-post .pa-chapter-nav a {
  display: block;
  padding: 16px 20px;
  background: var(--pa-bg-card);
  border: 1px solid var(--pa-border);
  border-radius: 4px;
  text-decoration: none;
  color: var(--pa-text-dim);
  transition: all 0.15s;
}
body.is-single-post .pa-chapter-nav a:hover {
  background: var(--pa-bg-card-hi);
  border-color: var(--pa-border-hi);
}
body.is-single-post .pa-chapter-nav .label {
  display: block;
  font-family: Menlo, monospace;
  font-size: 11px;
  color: var(--pa-text-faint);
  letter-spacing: 0.1em;
}
body.is-single-post .pa-chapter-nav .title {
  display: block;
  font-size: 14px;
  color: var(--pa-text);
  margin-top: 4px;
}

/* Footer */
body.is-single-post .pa-footer {
  max-width: 880px;
  margin: 0 auto;
  padding: 40px 40px;
  border-top: 1px solid var(--pa-border);
  color: var(--pa-text-faint);
  font-size: 12px;
  font-family: Menlo, monospace;
  letter-spacing: 0.05em;
  text-align: center;
}

/* Mobile / narrow: collapse to single column, hide TOC */
@media (max-width: 900px) {
  body.is-single-post .pa-layout { grid-template-columns: 1fr; }
  body.is-single-post .pa-toc { display: none; }
  body.is-single-post .pa-main { padding: 24px 18px 60px; }
}

/* Mobile */
@media (max-width: 720px) {
  body.is-single-post .pa-brand-bar {
    flex-wrap: wrap;
    gap: 10px;
    padding: 12px 18px;
  }
  body.is-single-post .pa-main {
    padding: 24px 18px 60px;
  }
  body.is-single-post .pa-title { font-size: 26px; }
  body.is-single-post .pa-chapter-nav {
    grid-template-columns: 1fr;
  }
  body.is-single-post .pa-chapter-nav .next { text-align: left; }
  body.is-single-post .pa-footer { padding: 32px 18px; }
}
</style>
