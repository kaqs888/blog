<!DOCTYPE html>
<html lang="{{ $.Site.LanguageCode }}" class="{{ $.Site.Params.htmlClass }}">

{{ partial "head.html" . }}

<body class="is-single-post">

    <header class="pa-brand-bar">
      <a href="/" class="pa-brand">{{ .Site.Title }}</a>
      <nav class="pa-nav">
        {{ range .Site.Params.navItems }}<a href="{{ index . 1 }}">{{ index . 0 }}</a>{{ end }}
      </nav>
    </header>

    <main class="pa-main">
      {{- block "main" . }}{{- end }}
    </main>

    <footer class="pa-footer">© {{ .Site.Params.author.name }}</footer>

</body>

</html>
